name: HKO TC track ingest

on:
  schedule:
    - cron: "7,37 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch HKO TC tracks and regenerate hk_tctrack.js
        run: python3 scripts/ingest_tctrack.py
      - name: Commit only if data changed (ignoring generatedAt)
        run: |
          strip() { grep -v '"generatedAt"' "$1" || true; }
          if git show HEAD:hk_tctrack.js > /tmp/old.js 2>/dev/null \
             && diff <(strip /tmp/old.js) <(strip hk_tctrack.js) > /dev/null; then
            echo "TC track unchanged — no commit."
            exit 0
          fi
          git config user.name "atlas-bot"
          git config user.email "actions@users.noreply.github.com"
          git add hk_tctrack.js
          git commit -m "HKO TC track update"
          git push
